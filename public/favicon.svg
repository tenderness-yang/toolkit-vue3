<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><circle cx="50" cy="50" r="45" fill="url(#gradient)"></circle><g transform="translate(50, 50)">
    <!-- 扳手手柄 -->
    <rect x="-25" y="-5" width="30" height="10" rx="5" fill="#ffffff"></rect>
    <!-- 扳手头 -->
    <path d="M5,-10 L15,-10 L15,10 L5,10 Z" fill="#ffffff"></path>
    <!-- 齿轮 -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ffffff" stroke-width="3"></circle>
    <rect x="-3" y="-20" width="6" height="10" fill="#ffffff"></rect>
    <rect x="-20" y="-3" width="10" height="6" fill="#ffffff"></rect>
  </g><defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"></stop>
      <stop offset="100%" stop-color="#8b5cf6"></stop>
    </linearGradient>
  </defs></svg>