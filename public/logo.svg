<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" />
  
  <!-- 工具图标 -->
  <g transform="translate(100, 100)">
    <!-- 扳手 -->
    <path d="M-30,-20 L-20,-30 L-10,-20 L-20,-10 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2" />
    <path d="M-25,-15 L-15,-25" stroke="#ffffff" stroke-width="3" />
    
    <!-- 螺丝刀 -->
    <path d="M10,-30 L20,-30 L20,-10 L10,-10 Z" fill="#ffffff" />
    <path d="M15,-30 L15,-40" stroke="#ffffff" stroke-width="3" />
    <circle cx="15" cy="-45" r="3" fill="#ffffff" />
    
    <!-- 齿轮 -->
    <circle cx="25" cy="25" r="15" fill="none" stroke="#ffffff" stroke-width="3" />
    <g transform="rotate(45, 25, 25)">
      <rect x="20" y="10" width="10" height="30" fill="#ffffff" />
      <rect x="10" y="20" width="30" height="10" fill="#ffffff" />
    </g>
    
    <!-- 锤子 -->
    <path d="M-25,20 L-15,20 L-15,35 L-25,35 Z" fill="#ffffff" />
    <path d="M-30,15 L-10,15 L-10,20 L-30,20 Z" fill="#ffffff" />
    
    <!-- 中心点 -->
    <circle cx="0" cy="0" r="5" fill="#ffffff" />
  </g>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
</svg>
